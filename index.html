<!DOCTYPE html>
<html>
    <body>
        <script type="text/javascript">
            const CSV_URL = "https://raw.githubusercontent.com/agoranomic/cases/master/out.csv";
            const MAIN_TABLE_URL = "https://raw.githubusercontent.com/agoranomic/cases/master/main_table.html";
            const GITHUB_RAW_CASE_BASE = "https://raw.githubusercontent.com/AgoraNomic/cases/master/"

            window.addEventListener('load', async () => {
                document.getElementById("script-generation-container").style.visibility = "hidden";

                const csvElements = (await (await fetch(CSV_URL)).text()).split("\n").filter(s => s.trim() != "");

                const urlQuestionKeys = Array.from(new URLSearchParams(window.location.search).keys());

                if (urlQuestionKeys.length == 1 && csvElements.includes(urlQuestionKeys[0])) {
                    const CASE_PAGE_CSS = `
                    body {
                      font-family: monospace;
                    }
                 
                    table {
                      font: 1em/1.2 \"Helvetica Neue\", Helvetica, Arial, Geneva, sans-serif;
                      border-collapse: collapse;
                      width: 550px;
                    }         
                    a:link     {text-decoration: none;  color: white;}
                    a:visited  {text-decoration: none;  color: white;}
                    td:hover {background-color: #666;}
                    td {
                       border: 1px solid #ddd;
                       padding: 8px;
                       overflow: hidden;
                       font-size: 1.2em;
                       text-align: center;
                       background-color: #444;
                       color: white;
                    }
                    .indx{text-align:left; vertical-align:bottom; font-size:100%;}
                    .prev{text-align:right; vertical-align:bottom; font-size:85%;}
                    .next{text-align:left; vertical-align:bottom; font-size:85%;}
                    .text{text-align:right; vertical-align:bottom; font-size:100%;}
                    td a{
                      display: block;
                      margin: -10cm;
                      padding: 10cm;
                    }`;

                    const newStyle = document.createElement("style");
                    newStyle.type = "text/css";
                    newStyle.innerHTML = CASE_PAGE_CSS;
                    document.getElementsByTagName('head')[0].appendChild(newStyle);

                    const caseNum = urlQuestionKeys[0];
                    const caseCsvIndex = csvElements.indexOf(caseNum);

                    if (caseCsvIndex < 0) throw "Invalid case CSV index";

                    const casePrevNum = (caseCsvIndex === csvElements.length - 1) ? caseNum : csvElements[caseCsvIndex + 1];
                    const caseNextNum = (caseCsvIndex === 0) ? caseNum : csvElements[caseCsvIndex - 1];

                    const caseContentUrl = GITHUB_RAW_CASE_BASE + caseNum;

                    const caseResponseText = await (await fetch(caseContentUrl)).text();

                    document.title = "CFJ " + caseNum;
                    document.getElementById("script-generation-container").innerHTML = 
                        `
                         <table><tr>
                         <td class=\"indx\"><a href=\"./` + caseNum + `\">Index</a></td>
                         <td class=\"prev\"><a href=\"./?` + casePrevNum + `\"><b>&larr;&nbsp;` + casePrevNum + `</b></a></td>
                         <td><a href=\"./?` + caseNum + `\"><b>CFJ ` + caseNum +  `</b></a></td>
                         <td class=\"next\"><a href=\"./?` + caseNextNum + `\"><b>` + caseNextNum + `&nbsp;&rarr;</b></a></td>
                         <td class=\"text\"><a href=\"` + caseContentUrl + `\">text</a></td>
                         </tr></table><pre>` + caseResponseText + `</pre>`;
                } else {
                    const mainTableText = (await (await fetch(MAIN_TABLE_URL)).text());
                    document.title = "CFJ Archives";

                    document.getElementById("script-generation-container").innerHTML = mainTableText;
                }

                document.getElementById("script-generation-container").style.visibility = "visible";
            });
        </script>
        <div id="script-generation-container">
            <p>This element is dynamically filled in by Javascript. If you are seeing this on the Internet Archive, check the archive for the GitHub repo agoranomic/cases.</p>
        </div>
    </body>
</html>
